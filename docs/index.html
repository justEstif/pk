<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pk — project knowledge CLI</title>
  <meta name="description" content="Structured bookkeeping for every project. Decisions, questions, notes, and sources — organized, searchable, stored locally.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@900&family=JetBrains+Mono:wght@400;500&family=Hanken+Grotesk:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- ── Nav ──────────────────────────────────────────────── -->
  <nav>
    <div class="nav-inner">
      <span class="logo">pk</span>
      <a href="https://github.com/justEstif/pk" target="_blank" rel="noopener" class="nav-gh">GitHub ↗</a>
    </div>
  </nav>

  <!-- ── Page ──────────────────────────────────────────────── -->
  <div class="grid-area">
    <div class="inner">

      <h1>Structured bookkeeping<br>for every project.</h1>

      <p class="desc">
        Drop in information as you work — a decision, a Slack thread, a doc, a question you haven't answered yet.
        Your agent organizes it. The more you put in, the more useful it gets.
      </p>

      <!-- Install -->
      <button class="install-block" id="install-block" title="Click to copy">
        <span class="dim">$</span>
        <span class="amber"> npm install -g @justestif/pk</span>
      </button>
      <div id="install-toast" class="copy-toast" aria-live="polite"></div>

      <!-- Harnesses -->
      <div class="harnesses">
        <button class="harness" data-cmd="pk init myproject --harness claude-desktop" title="Click to copy">Claude Desktop</button>
        <button class="harness" data-cmd="pk init myproject --harness claude"         title="Click to copy">Claude Code</button>
        <button class="harness" data-cmd="pk init myproject --harness cursor"         title="Click to copy">Cursor</button>
        <button class="harness" data-cmd="pk init myproject --harness codex"          title="Click to copy">Codex</button>
        <button class="harness" data-cmd="pk init myproject --harness omp"            title="Click to copy">OMP</button>
        <button class="harness" data-cmd="pk init myproject --harness opencode"       title="Click to copy">OpenCode</button>
      </div>
      <div id="harness-toast" class="copy-toast" aria-live="polite"></div>
      <div class="harness-divider"></div>

      <!-- Tabbed terminal demo -->
      <div class="demo-tabs" role="tablist">
        <button class="demo-tab active" data-tab="acme"  role="tab" aria-selected="true">acme <span class="tab-hint">startup</span></button>
        <button class="demo-tab"        data-tab="nova"  role="tab" aria-selected="false">nova <span class="tab-hint">research</span></button>
        <button class="demo-tab"        data-tab="atlas" role="tab" aria-selected="false">atlas <span class="tab-hint">consulting</span></button>
      </div>

      <div class="terminal">
        <div class="terminal-bar">
          <span class="dot dot-r" aria-hidden="true"></span>
          <span class="dot dot-y" aria-hidden="true"></span>
          <span class="dot dot-g" aria-hidden="true"></span>
          <span class="win-label" id="win-label">Claude Code · ~/projects/acme</span>
        </div>
        <div class="terminal-body" id="demo-body" role="log" aria-live="polite"></div>
      </div>

    </div>
  </div>

  <!-- ── Footer ───────────────────────────────────────────── -->
  <footer>
    <div class="footer-inner">
      <span class="logo">pk</span>
      <div class="footer-links">
        <a href="https://github.com/justEstif/pk" target="_blank" rel="noopener">GitHub</a>
        <a href="https://www.npmjs.com/package/@justestif/pk" target="_blank" rel="noopener">npm</a>
        <span>MIT License</span>
      </div>
    </div>
  </footer>

  <script src="js/terminal.js"></script>
  <script>
    function copyWithToast(text, toastEl, sourceEl) {
      navigator.clipboard.writeText(text).then(() => {
        sourceEl.classList.add('copied');
        toastEl.textContent = 'Copied!';
        setTimeout(() => {
          sourceEl.classList.remove('copied');
          toastEl.textContent = '';
        }, 2000);
      });
    }

    document.getElementById('install-block').addEventListener('click', function () {
      copyWithToast('npm install -g @justestif/pk', document.getElementById('install-toast'), this);
    });

    document.querySelectorAll('.harness').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.harness').forEach(b => b.classList.remove('copied'));
        const toast = document.getElementById('harness-toast');
        toast.textContent = '';
        copyWithToast(btn.dataset.cmd, toast, btn);
      });
    });
  </script>

</body>
</html>
