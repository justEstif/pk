name: publish
on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          # no registry-url — avoids setup-node injecting GITHUB_TOKEN as NODE_AUTH_TOKEN
      - run: bun install --frozen-lockfile
      - run: make build
      - name: version check
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          [ "$PKG_VERSION" != "$TAG_VERSION" ] && echo "VERSION MISMATCH: package=$PKG_VERSION tag=$TAG_VERSION" && exit 1
          echo "version ok: $PKG_VERSION"
      - name: publish
        run: npm publish --provenance --access public
